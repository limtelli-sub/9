<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Run - Robot Obstacle Course</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="glass-panel">
                <h1 class="neon-text">NEON RUN</h1>
                <p class="subtitle">로봇 장애물 피하기 게임</p>
                <div class="controls-info">
                    <p><span>[Space]</span> 점프</p>
                    <p><span>[Enter]</span> 속도 2배 부스트 (쿨타임 2.5초)</p>
                    <p><span>[Shift]</span> 무적 방어막 3초 (게임당 2회)</p>
                    <p><span>[Ctrl]</span> 속도 감속 0.8배 (시작 5초 후, 쿨타임 5초)</p>
                </div>
                <button id="start-btn" class="neon-button">GAME START</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div id="ui-layer">
                <div class="left-ui">
                    <div class="score-board">
                        <p>SCORE: <span id="score">0</span></p>
                        <p>HIGH SCORE: <span id="high-score">0</span></p>
                    </div>
                </div>
                <div class="right-ui">
                    <div class="speed-board">
                        <p>SPEED: <span id="speed">1.0</span>x</p>
                    </div>
                    <div class="status-board">
                        <p>SHIELD: <span id="shield-count">2</span></p>
                        <p>BOOST: <span id="boost-status" class="ready">READY</span></p>
                        <p>SLOW: <span id="slow-status" class="cooldown">WAIT</span></p>
                    </div>
                </div>
            </div>
            
            <div id="game-area">
                <div class="ground"></div>
                <div id="robot" class="run">
                    <div class="robot-arm arm-left"></div>
                    <div class="robot-leg leg-left"></div>
                    <div class="robot-body">
                        <div class="robot-eye"></div>
                    </div>
                    <div class="robot-arm arm-right"></div>
                    <div class="robot-leg leg-right"></div>
                    <div class="robot-glow"></div>
                </div>
                <div id="obstacles"></div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <div class="glass-panel">
                <h2 class="neon-text red">CRASHED!</h2>
                <div class="result-stats">
                    <p>최종 점수: <span id="final-score" class="highlight">0</span></p>
                </div>
                <div class="button-group">
                    <button id="restart-btn" class="neon-button">RESTART</button>
                    <button id="home-btn" class="neon-button secondary">HOME</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
