<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음이 닿는 책 - 맞춤형 도서 추천</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>마음이 닿는 책</h1>
            <p>당신의 관심사를 들려주세요. 그에 맞는 이야기를 찾아드릴게요.</p>
        </header>

        <section class="search-section">
            <input type="text" id="interestInput" placeholder="예: 따뜻한 위로, 철학, 사랑, 우주..." />
            <button id="searchBtn">추천받기</button>
        </section>

        <div id="loading" class="loading hidden">당신의 마음에 닿을 책을 찾고 있습니다...</div>
        
        <section class="results-section">
            <div id="bookList" class="book-grid">
                <!-- 도서 카드가 여기에 동적으로 추가됩니다 -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
